{{ $author := .Site.Data.author }}
{{ $social := .Site.Data.social }}

<section class="hero">

  <h1>{{ $author.name }}</h1>

  <p>
    <strong>{{ $author.headline }}</strong>
  </p>

  <p>{{ $author.location }}</p>

  <p>{{ $author.bio }}</p>

  <p>

    <a href="/resume/">Resume</a>

    |

    <a href="/articles/">Articles</a>

    |

    <a href="{{ $social.github }}">GitHub</a>

    |

    <a href="{{ $social.linkedin }}">LinkedIn</a>

  </p>

</section>
